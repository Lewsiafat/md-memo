<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md-memo</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME (default) ── */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --surface3: #2a2f47;
      --border: #2e3250;
      --text: #e2e4f0;
      --text2: #7b80a0;
      --text3: #545878;
      --accent: #7c6af7;
      --accent-h: #9d94ff;
      --accent-dim: #7c6af720;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --radius: 10px;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --md-code-bg: #22263a;
      --md-code-color: #c0c8ff;
      --md-pre-code-color: #b8c2ff;
      --md-strong: #fff;
      --md-bq-bg: #1a1d27;
      --md-tr-even: #1a1d27;
    }

    /* ── LIGHT THEME ── */
    body.light {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --surface3: #e5e1d8;
      --border: #ddd8cc;
      --text: #1a1714;
      --text2: #6b6558;
      --text3: #a09880;
      --accent: #6655e0;
      --accent-h: #7c6af7;
      --accent-dim: #6655e015;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --md-code-bg: #ede9e0;
      --md-code-color: #5a4fcf;
      --md-pre-code-color: #3730a3;
      --md-strong: #111;
      --md-bq-bg: #f0edf8;
      --md-tr-even: #f7f4ee;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── TOPBAR ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #topbar h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--accent);
      margin-right: auto;
    }
    #topbar h1 span { color: var(--text3); font-weight: 400; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--surface3); }
    .btn-icon {
      padding: 6px 9px;
      background: transparent;
      color: var(--text2);
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    #export-btns { display: flex; gap: 5px; }

    /* ── MAIN LAYOUT ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── EDITOR PANEL ── */
    #editor-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      position: relative;
    }

    /* ── WORK AREA ── */
    #work-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #editor-area {
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    #raw-input {
      width: 100%;
      height: 100%;
      padding: 22px;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-size: 16px;
      line-height: 1.75;
      font-family: var(--mono);
      tab-size: 2;
    }
    #raw-input::placeholder { color: var(--text3); }

    /* ── PREVIEW ── */
    #preview-wrap {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 28px 32px;
      display: none;
      background: var(--bg);
    }
    #preview-wrap.visible { display: block; }
    #preview { max-width: 740px; margin: 0 auto; font-size: 16px; line-height: 1.82; }

    /* ── QUICK VIEW ── */
    #quickview-panel {
      width: 0;
      overflow: hidden;
      border-left: none;
      transition: width .25s ease, border .25s;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #quickview-panel.open {
      width: 45%;
      border-left: 1px solid var(--border);
    }
    #quickview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 13px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    #quickview-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    #quickview-body { flex: 1; overflow-y: auto; padding: 20px 22px; }
    #quickview-content { font-size: 14.5px; line-height: 1.75; }

    /* ── MARKDOWN STYLES ── */
    .md-render h1,.md-render h2,.md-render h3,.md-render h4 {
      color: var(--text);
      margin: 1.3em 0 .45em;
      font-weight: 700;
      line-height: 1.3;
    }
    .md-render h1 { font-size: 1.55em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
    .md-render h2 { font-size: 1.28em; }
    .md-render h3 { font-size: 1.08em; }
    .md-render p { margin: .65em 0; }
    .md-render ul,.md-render ol { margin: .65em 0 .65em 1.4em; }
    .md-render li { margin: .28em 0; }
    .md-render code {
      background: var(--md-code-bg);
      color: var(--md-code-color);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: .86em;
    }
    .md-render pre {
      background: var(--md-code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px;
      overflow-x: auto;
      margin: .9em 0;
    }
    .md-render pre code { background: none; padding: 0; font-size: .85em; color: var(--md-pre-code-color); }
    .md-render blockquote {
      border-left: 3px solid var(--accent);
      margin: .9em 0;
      padding: .35em .9em;
      color: var(--text2);
      font-style: italic;
      background: var(--md-bq-bg);
      border-radius: 0 6px 6px 0;
    }
    .md-render hr { border: none; border-top: 1px solid var(--border); margin: 1.4em 0; }
    .md-render table { border-collapse: collapse; width: 100%; margin: .9em 0; font-size: .9em; }
    .md-render th,.md-render td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; }
    .md-render th { background: var(--surface2); font-weight: 600; }
    .md-render tr:nth-child(even) { background: var(--md-tr-even); }
    .md-render strong { color: var(--md-strong); font-weight: 700; }
    .md-render a { color: var(--accent); text-decoration: none; }
    .md-render a:hover { text-decoration: underline; }

    /* ── LOADING ── */
    #loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 20;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(3px);
    }
    #loading-overlay.visible { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text2); font-size: 13px; }

    /* ── EDITOR FOOTER ── */
    #editor-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 15px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      font-size: 12.5px;
      color: var(--text2);
      gap: 8px;
    }
    #char-count { font-family: var(--mono); }
    #current-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent-h);
      border: 1px solid #7c6af730;
      letter-spacing: .02em;
    }

    /* ── HISTORY PANEL ── */
    #history-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    /* ── TAG CLOUD ── */
    #tag-section { border-bottom: 1px solid var(--border); overflow: hidden; }
    #tag-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 13px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text2);
    }
    #tag-toggle:hover { color: var(--text); }
    #tag-toggle-arrow { font-size: 9px; transition: transform .2s; color: var(--text3); }
    #tag-toggle-arrow.open { transform: rotate(180deg); }
    #tag-cloud-wrap { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
    #tag-cloud-wrap.open { max-height: 200px; }
    #tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 13px 11px; }

    .tag-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      transition: all .15s;
    }
    .tag-filter-chip:hover { border-color: var(--accent); color: var(--text); }
    .tag-filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-h); }
    .tag-filter-chip .tag-count { font-size: 10px; opacity: .7; }

    /* ── HISTORY HEADER ── */
    #history-header {
      padding: 9px 13px 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #history-header h2 { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text2); }
    #history-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }

    #history-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    #history-list::-webkit-scrollbar { width: 3px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .history-item {
      padding: 10px 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      position: relative;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }
    .history-item:hover .hi-actions { opacity: 1; }

    .hi-time { font-size: 10.5px; color: var(--text3); font-family: var(--mono); margin-bottom: 3px; }
    .hi-preview {
      font-size: 13px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      line-height: 1.4; margin-bottom: 5px;
    }
    .hi-tags { display: flex; gap: 3px; flex-wrap: wrap; }
    .hi-tag {
      font-size: 10.5px;
      padding: 1px 7px;
      border-radius: 20px;
      background: var(--surface3);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    /* action buttons (share + delete) on hover */
    .hi-actions {
      opacity: 0;
      position: absolute;
      right: 8px; top: 8px;
      display: flex;
      gap: 4px;
      transition: opacity .15s;
    }
    .hi-action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10.5px;
      cursor: pointer;
      transition: background .15s;
      color: var(--text2);
    }
    .hi-action-btn:hover { background: var(--surface3); color: var(--text); }
    .hi-action-btn.delete { color: var(--red); }
    .hi-action-btn.delete:hover { background: #f8717115; }

    #history-empty {
      padding: 36px 14px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.7;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      opacity: 0;
      transition: opacity .22s, transform .22s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: #4ade8050; color: var(--green); }
    #toast.error { border-color: #f8717150; color: var(--red); }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      body { overflow: auto; }
      #main { flex-direction: column; overflow: visible; }
      #editor-panel { border-right: none; border-bottom: 1px solid var(--border); min-height: 55vh; }
      #history-panel { width: 100%; height: auto; max-height: 45vh; }
      #quickview-panel.open { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      #work-area { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div id="topbar">
    <h1>md<span>-</span>memo</h1>
    <button class="btn btn-ghost" id="btn-new" style="display:none">＋ New</button>
    <div id="export-btns" style="display:none">
      <button class="btn btn-ghost" id="btn-edit">✏️ Edit</button>
      <button class="btn btn-ghost" id="btn-share">🔗 Share</button>
      <button class="btn btn-ghost" id="btn-copy">📋 Copy</button>
      <button class="btn btn-ghost" id="btn-download">⬇️ .md</button>
    </div>
    <button class="btn-icon" id="btn-theme" title="Toggle theme">🌙</button>
    <button class="btn btn-primary" id="btn-format">✨ Format</button>
  </div>

  <div id="main">

    <div id="editor-panel">
      <div id="work-area">

        <div id="editor-area">
          <textarea id="raw-input" placeholder="Paste or type your raw notes here…

Ctrl+Enter to format."></textarea>

          <div id="preview-wrap">
            <div id="preview" class="md-render"></div>
          </div>

          <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Formatting…</div>
          </div>
        </div>

        <div id="quickview-panel">
          <div id="quickview-header">
            <span id="quickview-title">Quick View</span>
            <button class="btn btn-ghost" id="btn-qv-restore" style="padding:3px 9px;font-size:11px">↩ Restore</button>
            <button class="btn-icon" id="btn-qv-close" title="Close">✕</button>
          </div>
          <div id="quickview-body">
            <div id="quickview-content" class="md-render"></div>
          </div>
        </div>

      </div>

      <div id="editor-footer">
        <span id="char-count">0 chars</span>
        <div id="current-tags"></div>
        <span id="status-text"></span>
      </div>
    </div>

    <div id="history-panel">
      <div id="tag-section">
        <div id="tag-toggle">
          <span>🏷 Tags</span>
          <span id="tag-toggle-arrow">▼</span>
        </div>
        <div id="tag-cloud-wrap">
          <div id="tag-cloud">
            <span style="font-size:12px;color:var(--text3);padding:4px 0">No tags yet</span>
          </div>
        </div>
      </div>

      <div id="history-header">
        <h2>History</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <span id="history-count"></span>
          <button class="btn-icon" style="font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text2)" id="btn-clear-all">Clear</button>
        </div>
      </div>

      <div id="history-list">
        <div id="history-empty">No formatted memos yet.<br>Write something and hit Format!</div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = '__BASE_PATH__/api';
    const BASE = location.origin + '__BASE_PATH__';

    // State
    let currentMarkdown = '';
    let currentTags = [];
    let currentId = null;
    let isPreviewMode = false;
    let history = [];
    let activeTagFilter = null;
    let quickViewEntry = null;

    // DOM
    const rawInput       = document.getElementById('raw-input');
    const previewWrap    = document.getElementById('preview-wrap');
    const preview        = document.getElementById('preview');
    const loadingOverlay = document.getElementById('loading-overlay');
    const btnFormat      = document.getElementById('btn-format');
    const btnNew         = document.getElementById('btn-new');
    const btnEdit        = document.getElementById('btn-edit');
    const btnShare       = document.getElementById('btn-share');
    const btnCopy        = document.getElementById('btn-copy');
    const btnDownload    = document.getElementById('btn-download');
    const btnTheme       = document.getElementById('btn-theme');
    const btnClearAll    = document.getElementById('btn-clear-all');
    const exportBtns     = document.getElementById('export-btns');
    const charCount      = document.getElementById('char-count');
    const statusText     = document.getElementById('status-text');
    const currentTagsEl  = document.getElementById('current-tags');
    const historyList    = document.getElementById('history-list');
    const historyEmpty   = document.getElementById('history-empty');
    const historyCount   = document.getElementById('history-count');
    const tagToggle      = document.getElementById('tag-toggle');
    const tagToggleArrow = document.getElementById('tag-toggle-arrow');
    const tagCloudWrap   = document.getElementById('tag-cloud-wrap');
    const tagCloud       = document.getElementById('tag-cloud');
    const qvPanel        = document.getElementById('quickview-panel');
    const qvTitle        = document.getElementById('quickview-title');
    const qvContent      = document.getElementById('quickview-content');
    const btnQvRestore   = document.getElementById('btn-qv-restore');
    const btnQvClose     = document.getElementById('btn-qv-close');
    const toast          = document.getElementById('toast');

    // ── THEME ──
    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      btnTheme.textContent = light ? '☀️' : '🌙';
      localStorage.setItem('md-memo-theme', light ? 'light' : 'dark');
    }
    // Init theme
    applyTheme(localStorage.getItem('md-memo-theme') === 'light');
    btnTheme.addEventListener('click', () => applyTheme(!document.body.classList.contains('light')));

    // ── TOAST ──
    let toastTimer;
    function showToast(msg, type = '') {
      toast.textContent = msg;
      toast.className = 'show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = ''; }, 2600);
    }

    // ── CHAR COUNT ──
    rawInput.addEventListener('input', () => {
      charCount.textContent = rawInput.value.length.toLocaleString() + ' chars';
    });

    // ── FORMAT ──
    btnFormat.addEventListener('click', doFormat);
    rawInput.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doFormat(); }
    });

    async function doFormat() {
      const text = rawInput.value.trim();
      if (!text) { showToast('Write something first!', 'error'); return; }
      setLoading(true);
      try {
        const res = await fetch(`${API}/format`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Format failed');

        currentMarkdown = data.markdown;
        currentTags = data.tags || [];
        currentId = data.id;
        showPreview(currentMarkdown);
        renderCurrentTags(currentTags);
        statusText.textContent = '✓ Formatted';
        loadHistoryData();
        closeQuickView();
        showToast('Formatted!', 'success');
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        statusText.textContent = '✗ Error';
      } finally {
        setLoading(false);
      }
    }

    // ── PREVIEW / EDIT ──
    function showPreview(md) {
      isPreviewMode = true;
      preview.innerHTML = marked.parse(md);
      preview.className = 'md-render';
      previewWrap.classList.add('visible');
      rawInput.style.display = 'none';
      exportBtns.style.display = 'flex';
      btnNew.style.display = '';
      btnFormat.textContent = '✨ Re-format';
    }

    function resetToNew() {
      isPreviewMode = false;
      currentMarkdown = '';
      currentTags = [];
      currentId = null;
      previewWrap.classList.remove('visible');
      rawInput.style.display = '';
      rawInput.value = '';
      exportBtns.style.display = 'none';
      btnNew.style.display = 'none';
      btnFormat.textContent = '✨ Format';
      charCount.textContent = '0 chars';
      statusText.textContent = '';
      currentTagsEl.innerHTML = '';
      closeQuickView();
      rawInput.focus();
    }

    btnNew.addEventListener('click', resetToNew);

    btnEdit.addEventListener('click', () => {
      isPreviewMode = false;
      previewWrap.classList.remove('visible');
      rawInput.style.display = '';
      exportBtns.style.display = 'none';
      rawInput.value = currentMarkdown;
      charCount.textContent = currentMarkdown.length.toLocaleString() + ' chars';
      btnFormat.textContent = '✨ Format';
      statusText.textContent = '';
      rawInput.focus();
    });

    // ── SHARE / PERMALINK ──
    btnShare.addEventListener('click', async () => {
      if (!currentId) return;
      const url = `${BASE}/m/${currentId}`;
      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      showToast('🔗 Link copied!', 'success');
    });

    // ── COPY MARKDOWN ──
    btnCopy.addEventListener('click', async () => {
      if (!currentMarkdown) return;
      try {
        await navigator.clipboard.writeText(currentMarkdown);
        showToast('Copied!', 'success');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = currentMarkdown; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('Copied!', 'success');
      }
    });

    // ── DOWNLOAD ──
    btnDownload.addEventListener('click', () => {
      if (!currentMarkdown) return;
      const blob = new Blob([currentMarkdown], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.href = url; a.download = `memo-${ts}.md`; a.click();
      URL.revokeObjectURL(url);
      showToast('Downloaded!', 'success');
    });

    // ── QUICK VIEW ──
    function openQuickView(entry) {
      quickViewEntry = entry;
      const rawPreview = (entry.preview || '').replace(/^#+\s*/, '').replace(/\*\*/g, '').replace(/`/g, '');
      qvTitle.textContent = rawPreview || 'Quick View';
      qvContent.innerHTML = marked.parse(entry.markdown);
      qvPanel.classList.add('open');
    }

    function closeQuickView() {
      qvPanel.classList.remove('open');
      quickViewEntry = null;
      document.querySelectorAll('.history-item.active').forEach(el => el.classList.remove('active'));
    }

    btnQvClose.addEventListener('click', closeQuickView);
    btnQvRestore.addEventListener('click', () => {
      if (!quickViewEntry) return;
      currentMarkdown = quickViewEntry.markdown;
      currentTags = quickViewEntry.tags || [];
      currentId = quickViewEntry.id;
      rawInput.value = quickViewEntry.raw;
      charCount.textContent = quickViewEntry.raw.length.toLocaleString() + ' chars';
      showPreview(currentMarkdown);
      renderCurrentTags(currentTags);
      statusText.textContent = '↩ Restored';
      showToast('Memo restored', 'success');
      closeQuickView();
    });

    // ── CURRENT TAGS ──
    function renderCurrentTags(tags) {
      currentTagsEl.innerHTML = '';
      tags.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.textContent = t;
        currentTagsEl.appendChild(chip);
      });
    }

    // ── LOADING ──
    function setLoading(on) {
      loadingOverlay.classList.toggle('visible', on);
      btnFormat.disabled = on;
    }

    // ── TAG CLOUD TOGGLE ──
    tagToggle.addEventListener('click', () => {
      const isOpen = tagCloudWrap.classList.toggle('open');
      tagToggleArrow.classList.toggle('open', isOpen);
    });

    // ── TAG FILTER ──
    function setTagFilter(tag) {
      activeTagFilter = activeTagFilter === tag ? null : tag;
      renderTagCloud();
      renderHistoryItems();
    }

    // ── HISTORY ──
    async function loadHistoryData() {
      try {
        const res = await fetch(`${API}/history`);
        history = await res.json();
        renderTagCloud();
        renderHistoryItems();
      } catch {}
    }

    function getFilteredHistory() {
      if (!activeTagFilter) return history;
      return history.filter(e => (e.tags || []).includes(activeTagFilter));
    }

    function renderTagCloud() {
      const tagMap = {};
      history.forEach(e => (e.tags || []).forEach(t => { tagMap[t] = (tagMap[t] || 0) + 1; }));
      const tags = Object.entries(tagMap).sort((a, b) => b[1] - a[1]);

      tagCloud.innerHTML = '';
      if (!tags.length) {
        tagCloud.innerHTML = '<span style="font-size:12px;color:var(--text3);padding:4px 0">No tags yet</span>';
        return;
      }

      const allChip = document.createElement('span');
      allChip.className = 'tag-filter-chip' + (!activeTagFilter ? ' active' : '');
      allChip.innerHTML = `All <span class="tag-count">${history.length}</span>`;
      allChip.addEventListener('click', () => setTagFilter(null));
      tagCloud.appendChild(allChip);

      tags.forEach(([tag, count]) => {
        const chip = document.createElement('span');
        chip.className = 'tag-filter-chip' + (activeTagFilter === tag ? ' active' : '');
        chip.innerHTML = `${escHtml(tag)} <span class="tag-count">${count}</span>`;
        chip.addEventListener('click', () => setTagFilter(tag));
        tagCloud.appendChild(chip);
      });
    }

    function renderHistoryItems() {
      const filtered = getFilteredHistory();
      historyCount.textContent = filtered.length ? `${filtered.length}` : '';
      historyList.querySelectorAll('.history-item').forEach(el => el.remove());

      if (!filtered.length) {
        historyEmpty.style.display = '';
        historyEmpty.textContent = activeTagFilter
          ? `No memos tagged "${activeTagFilter}"`
          : 'No formatted memos yet.\nWrite something and hit Format!';
        return;
      }
      historyEmpty.style.display = 'none';

      filtered.forEach(entry => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.dataset.id = entry.id;

        const d = new Date(entry.createdAt);
        const timeStr = d.toLocaleDateString('en', { month: 'short', day: 'numeric' })
          + ' ' + d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', hour12: false });

        const rawPreview = (entry.preview || '')
          .replace(/^#+\s*/, '').replace(/\*\*/g, '').replace(/`/g, '');
        const tagsHtml = (entry.tags || []).map(t => `<span class="hi-tag">${escHtml(t)}</span>`).join('');

        item.innerHTML = `
          <div class="hi-time">${timeStr}</div>
          <div class="hi-preview">${escHtml(rawPreview)}</div>
          ${tagsHtml ? `<div class="hi-tags">${tagsHtml}</div>` : ''}
          <div class="hi-actions">
            <button class="hi-action-btn share" title="Copy link">🔗</button>
            <button class="hi-action-btn delete" title="Delete">✕</button>
          </div>
        `;

        item.querySelector('.share').addEventListener('click', async e => {
          e.stopPropagation();
          const url = `${BASE}/m/${entry.id}`;
          try { await navigator.clipboard.writeText(url); }
          catch {
            const ta = document.createElement('textarea');
            ta.value = url; document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
          }
          showToast('🔗 Link copied!', 'success');
        });

        item.querySelector('.delete').addEventListener('click', async e => {
          e.stopPropagation();
          if (quickViewEntry?.id === entry.id) closeQuickView();
          await deleteEntry(entry.id);
        });

        item.addEventListener('click', e => {
          if (e.target.closest('.hi-actions')) return;
          handleHistoryClick(entry, item);
        });

        historyList.appendChild(item);
      });
    }

    function handleHistoryClick(entry, itemEl) {
      const hasContent = rawInput.value.trim().length > 0 && !isPreviewMode;
      if (hasContent) {
        document.querySelectorAll('.history-item.active').forEach(el => el.classList.remove('active'));
        itemEl.classList.add('active');
        openQuickView(entry);
      } else {
        currentMarkdown = entry.markdown;
        currentTags = entry.tags || [];
        currentId = entry.id;
        rawInput.value = entry.raw;
        charCount.textContent = entry.raw.length.toLocaleString() + ' chars';
        showPreview(entry.markdown);
        renderCurrentTags(currentTags);
        statusText.textContent = '↩ Restored';
        showToast('Memo restored', 'success');
        closeQuickView();
      }
    }

    async function deleteEntry(id) {
      await fetch(`${API}/history/${id}`, { method: 'DELETE' });
      history = history.filter(e => e.id !== id);
      renderTagCloud();
      renderHistoryItems();
    }

    btnClearAll.addEventListener('click', async () => {
      if (!history.length) return;
      if (!confirm('Clear all history?')) return;
      for (const e of history) await fetch(`${API}/history/${e.id}`, { method: 'DELETE' });
      history = [];
      activeTagFilter = null;
      renderTagCloud();
      renderHistoryItems();
      closeQuickView();
      showToast('History cleared');
    });

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadHistoryData();
    rawInput.focus();
  </script>
</body>
</html>
