  <script>
    const raw = "# Bug: SSE 在 Safari 中途斷線\n\n**現象**：agent 串流跑到一半，Safari 直接斷線；Chrome / Firefox 正常。\n\n```js\n// 疑似 Safari 對 text/event-stream 的 buffering 行為\nres.writeHead(200, {\n  'Content-Type': 'text/event-stream',\n  'Cache-Control': 'no-cache',\n  'Connection': 'keep-alive',\n});\n```\n\n## 待辦\n\n- [ ] 確認是否要送 keep-alive comment (`:\\n\\n`)\n- [ ] 測 `X-Accel-Buffering: no`\n- [ ] 在 Safari Technology Preview 重現";
    document.getElementById('content').innerHTML = DOMPurify.sanitize(marked.parse(raw));
    async function copyMd() {
      try { await navigator.clipboard.writeText(raw); }
      catch { const t=document.createElement('textarea');t.value=raw;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ Copied';
      setTimeout(() => btn.innerHTML = '📋 Copy Markdown', 2000);
    }
  </script>
